<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#080812" />
    <meta name="description" content="MindBridge — Anonymous peer mental health support with AI moderation" />
    <title>AI Care 🧠</title>
    <link rel="icon" href="%PUBLIC_URL%/favicon.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        background: #080812;
        color: #fff;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-family: 'DM Sans', sans-serif;
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 100px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
      /* Global animations */
      @keyframes fadeUp   { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
      @keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
      @keyframes spin     { to { transform: rotate(360deg); } }
      @keyframes pulseDot { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.45; transform:scale(0.8); } }
      @keyframes shimmer  { 0% { background-position:-400px 0; } 100% { background-position:400px 0; } }
      @keyframes float    { 0%,100% { transform:translateY(0px); } 50% { transform:translateY(-8px); } }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run MindBridge.</noscript>
    <div id="root"></div>
  </body>
</html>
